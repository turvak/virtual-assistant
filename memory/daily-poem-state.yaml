Content: |
  Good Friday — which means, in the holiest sense,
  that someone gets golf and it costs him no pence.
  The risen Lord rested; I'll take that as leave
  to be on the fairway by quarter to three.

  Last night we did Nanna's, hot cross buns and all,
  we ate till we stalled and then shuffled the hall.
  You smiled through the chaos, you passed the jam round —
  a woman of grace in a house full of sound.

  And now it's today: Find a Rainbow Day too,
  which someone invented, and honestly — who?
  But fine, there's a rainbow, it's out there somewhere,
  I'll look for it later, between birdie and par.

  The term is done, love. You can breathe for a bit.
  No emails, no meetings, no one throwing a fit.
  You carried the whole bloody thing on your back —
  new principal, no map, and a quarter the slack.

  They don't see the half of what you do in that place,
  but I do — every night, in the tired on your face.
  So sleep in, eat chocolate, ignore every screen.
  You've earned the most peaceful damn Easter you've seen.

  And look — I'm no good at the sentimental stuff,
  you know I find feelings a little bit rough —
  but somewhere between the buns, birdies, and rain,
  you're still the best thing in my whole ridiculous game.
